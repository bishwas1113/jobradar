name: Daily job scan

on:
  schedule:
    - cron: "0 10 * * *"    # 10:00 UTC = 6:00am ET during EDT (summer)
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force a full rescan (ignore previous runs today)'
        required: false
        type: boolean
        default: true
permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: minilm-l6-v2

      - name: Run pipeline
        timeout-minutes: 28   # leaves ~7 min of the 35-min job budget for setup + commit
        run: python -m jobradar.pipeline --max-age-days 14 ${{ github.event.inputs.force_full == 'true' && '--force-full' || '' }}

      - name: Commit results
        if: always()   # runs even if the scan above was cut off by its timeout,
                        # so whatever was checkpointed to disk still gets saved
        run: |
          git config user.name "jobradar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "Daily scan $(date -u +%F)"
          git push
