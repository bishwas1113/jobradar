name: Daily job scan

on:
  schedule:
    - cron: "20 11 * * *"   # 11:20 UTC = 7:20am ET, before your morning review
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: minilm-l6-v2

      - name: Run pipeline
        run: python -m jobradar.pipeline --max-age-days 3

      - name: Commit results
        run: |
          git config user.name "jobradar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "Daily scan $(date -u +%F)"
          git push
