# JobRadar company registry.
# ats: workday | greenhouse | lever | unknown
# verified: false means the tenant/board ID is a best guess.
#   Run `python -m jobradar.verify_config` to test every entry and get
#   suggested corrections before the first real pipeline run.
# Workday entries need: tenant, wd (e.g. wd1/wd3/wd5), site (career site name).
# Greenhouse entries need: board. Lever entries need: site.

search_terms:            # used by the Workday adapter (server-side search)
  - "commercial analytics"
  - "data strategy"
  - "business insights"
  - "customer analytics"
  - "pipeline analytics"
  - "R&D data"

