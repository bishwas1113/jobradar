name: Verify ATS endpoints

# Runs weekly and on-demand. Unlike anything checked inside a chat conversation,
# this job runs on GitHub's runners with full internet access and hits the
# REAL Workday/Greenhouse/Lever endpoints with the REAL adapter code -
# it either returns live job counts and a sample title, or it fails loudly.

on:
  schedule:
    - cron: "0 12 * * 1"   # Monday noon UTC
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Verify every company endpoint
        run: python -m jobradar.verify_config | tee verify_report.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: verify-report
          path: verify_report.txt
